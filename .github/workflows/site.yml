name: Site

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: site
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout SolverForge runtime source
        uses: actions/checkout@v4
        with:
          repository: SolverForge/solverforge
          path: .ci/solverforge-rs
          fetch-depth: 0

      - name: Checkout SolverForge maps source
        uses: actions/checkout@v4
        with:
          repository: SolverForge/solverforge-maps
          path: .ci/solverforge-maps

      - name: Checkout SolverForge UI source
        uses: actions/checkout@v4
        with:
          repository: SolverForge/solverforge-ui
          path: .ci/solverforge-ui

      - name: Checkout released SolverForge use-case bundle
        uses: actions/checkout@v4
        with:
          repository: SolverForge/solverforge-usecases
          # The coordinated releases were cut sequentially; the final tag
          # contains all four published app versions.
          ref: "solverforge-lessons@2.0.5"
          path: .ci/solverforge-usecases

      - name: Install Rust 1.95
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup default 1.95.0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: make install

      - name: Run local CI gate
        env:
          SOLVERFORGE_RS_REPO: ${{ github.workspace }}/.ci/solverforge-rs
          SOLVERFORGE_MAPS_REPO: ${{ github.workspace }}/.ci/solverforge-maps
          SOLVERFORGE_UI_REPO: ${{ github.workspace }}/.ci/solverforge-ui
          SOLVERFORGE_USECASES_REPO: ${{ github.workspace }}/.ci/solverforge-usecases
        run: make ci-local

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    if: ${{ github.server_url == 'https://github.com' && github.event_name != 'pull_request' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
